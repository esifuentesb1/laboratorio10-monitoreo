global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'backend-app'
    static_configs:
      - targets: ['backend:3001']

  - job_name: 'cadvisor-containers'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter-host'
    static_configs:
      - targets: ['node-exporter:9100']